global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: extract
    static_configs:
      - targets: ['extract:8000']
    metrics_path: /metrics

  - job_name: api
    static_configs:
      - targets: ['api:8000']
    metrics_path: /metrics

  - job_name: transform
    static_configs:
      - targets: ['transform:8000']
    metrics_path: /metrics

  - job_name: kafka
    static_configs:
      - targets: ['kafka-exporter:9308']
    metrics_path: /metrics
